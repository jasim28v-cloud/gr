<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ECHO | الشبكة الاجتماعية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #05070f; font-family: 'Segoe UI', system-ui; overflow: hidden; }
    .snap-scroll { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; scrollbar-width: none; }
    .snap-scroll::-webkit-scrollbar { display: none; }
    .story-card { scroll-snap-align: start; height: 100vh; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
    .media-element { width: 100%; height: 100%; object-fit: cover; }
    .gradient-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); pointer-events: none; }
    .action-bar { position: absolute; bottom: 20%; right: 15px; display: flex; flex-direction: column; gap: 20px; z-index: 30; }
    .action-icon { background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); width: 50px; height: 50px; border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
    .user-info-card { position: absolute; bottom: 20%; left: 16px; z-index: 30; color: white; text-shadow: 0 1px 5px black; }
    .comment-panel { position: absolute; bottom: 10%; left: 16px; right: 80px; background: rgba(20,20,35,0.8); backdrop-filter: blur(16px); border-radius: 40px; padding: 8px 16px; display: flex; gap: 10px; z-index: 35; }
    .floating-chat { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(16px); width: 56px; height: 56px; border-radius: 30px; display: flex; align-items: center; justify-content: center; z-index: 200; cursor: pointer; border: 1px solid #ff66cc; }
    .upload-floating { position: fixed; bottom: 20px; right: 20px; background: linear-gradient(135deg, #00c6ff, #0072ff); width: 64px; height: 64px; border-radius: 40px; display: flex; align-items: center; justify-content: center; z-index: 200; cursor: pointer; box-shadow: 0 0 20px #00c6ff; }
    .profile-mini { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); padding: 8px 16px; border-radius: 40px; display: flex; align-items: center; gap: 10px; z-index: 100; cursor: pointer; }
    .chat-window { position: fixed; bottom: 90px; left: 20px; width: 340px; height: 500px; background: rgba(10,15,30,0.95); backdrop-filter: blur(30px); border-radius: 32px; border: 1px solid #ff66cc; display: none; flex-direction: column; z-index: 300; overflow: hidden; }
    .profile-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 500; display: none; justify-content: center; align-items: center; }
    .profile-card { background: #0f1222; border-radius: 48px; max-width: 400px; width: 90%; padding: 24px; border: 1px solid #0ff; }
    .multi-images { display: flex; gap: 8px; overflow-x: auto; margin-top: 12px; }
    .multi-images img { width: 100px; height: 100px; object-fit: cover; border-radius: 16px; }
  </style>
</head>
<body>
  <div class="profile-mini" id="profileBtn">
    <i class="fas fa-user-astronaut text-cyan-400"></i>
    <span id="profileName">...</span>
  </div>
  <div class="snap-scroll" id="feedContainer"></div>
  <div class="floating-chat" id="chatToggle"><i class="fas fa-comment-dots text-2xl text-pink-400"></i></div>
  <div class="upload-floating" id="uploadBtn"><i class="fas fa-plus text-3xl"></i></div>
  <div class="chat-window" id="chatWindow">
    <div class="flex justify-between items-center p-4 border-b border-pink-500"><span>💬 نبض المجتمع</span><i id="closeChat" class="fas fa-times cursor-pointer"></i></div>
    <div id="chatMessagesList" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm"></div>
    <div class="p-4 flex gap-2"><input id="chatMsgInput" placeholder="رسالة..." class="flex-1 bg-black/50 rounded-full px-4 py-2"><button id="sendChatMsgBtn" class="text-pink-400">إرسال</button></div>
  </div>

  <!-- نافذة البروفايل -->
  <div id="profileModal" class="profile-modal">
    <div class="profile-card text-white">
      <div class="flex justify-between"><h2 class="text-xl font-bold">@<span id="modalUsername"></span></h2><i id="closeModal" class="fas fa-times cursor-pointer text-gray-400"></i></div>
      <div class="flex gap-6 my-4 text-center">
        <div><span id="modalPosts">0</span><br><span class="text-xs">منشورات</span></div>
        <div><span id="modalFollowers">0</span><br><span class="text-xs">متابعون</span></div>
        <div><span id="modalFollowing">0</span><br><span class="text-xs">يتابع</span></div>
      </div>
      <button id="followBtn" class="bg-cyan-600 w-full py-2 rounded-full">متابعة</button>
      <hr class="my-4 border-gray-700">
      <div id="profilePostsList" class="max-h-60 overflow-y-auto space-y-2"></div>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
