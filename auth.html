<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XSPHERE | الشبكة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010105; font-family: 'Segoe UI', system-ui; overflow-x: hidden; }
        :root { --neon: #0ff; }
        .bg-void { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #0a0f2a 0%, #010105 100%); z-index: -2; }
        .glass-header {
            position: fixed; top: 20px; left: 20px; right: 20px; z-index: 100;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none;
        }
        .brand {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
            padding: 8px 20px; border-radius: 40px; border-left: 3px solid var(--neon);
            pointer-events: auto;
        }
        .brand span { font-weight: bold; letter-spacing: 1px; }
        .clock { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 30px; padding: 8px 18px; font-size: 12px; font-family: monospace; }
        .grid-posts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            padding: 100px 24px 120px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .post-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            overflow: hidden;
            transition: 0.3s;
        }
        .post-card:hover { transform: translateY(-6px); border-color: var(--neon); box-shadow: 0 15px 25px rgba(0,0,0,0.3); }
        .media-fit { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .post-info { padding: 16px; }
        .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .avatar-sm { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--neon); }
        .post-text { font-size: 14px; color: #ddd; margin: 8px 0; }
        .post-stats { display: flex; gap: 20px; margin-top: 12px; }
        .stat-btn { background: none; border: none; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .stat-btn.liked { color: #ff66cc; text-shadow: 0 0 4px #ff66cc; }
        .floating-upload, .floating-chat {
            position: fixed; bottom: 30px; width: 60px; height: 60px; border-radius: 30px;
            display: flex; align-items: center; justify-content: center; z-index: 200; cursor: pointer;
            box-shadow: 0 0 15px rgba(0,255,255,0.5);
        }
        .floating-upload { right: 30px; background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .floating-chat { left: 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); border: 1px solid #ff66cc; }
        .glass-modal {
            position: fixed; inset: 0; background: rgba(5,0,2,0.96); backdrop-filter: blur(30px); z-index: 1000;
            display: none; justify-content: center; align-items: center; overflow-y: auto;
        }
        .glass-card {
            background: rgba(0,0,0,0.7); border: 1px solid rgba(0,255,255,0.3); border-radius: 48px;
            width: 90%; max-width: 550px; padding: 28px; margin: 40px auto;
        }
        .drop-area { border: 2px dashed #0ff; border-radius: 32px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 15px; }
        .progress-item { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 10px; margin-top: 10px; }
        .progress-bar { height: 6px; background: #2a2b3c; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #0ff; transition: width 0.2s; }
        .chat-window {
            position: fixed; bottom: 110px; left: 30px; width: 360px; height: 500px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(30px); border: 1px solid #ff66cc;
            border-radius: 32px; display: none; flex-direction: column; z-index: 300; overflow: hidden;
        }
        .online-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; margin-left: 6px; box-shadow: 0 0 5px #22c55e; }
        input, textarea { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 10px 16px; color: white; width: 100%; outline: none; }
        button { transition: 0.2s; }
        button:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="bg-void"></div>

<header class="glass-header">
    <div class="brand"><span>🌐 XSPHERE</span></div>
    <div class="clock" id="liveClock"></div>
</header>

<div class="grid-posts" id="postsGrid"></div>

<div class="floating-upload" id="uploadBtn"><i class="fas fa-plus text-2xl"></i></div>
<div class="floating-chat" id="chatToggle"><i class="fas fa-comment-dots text-2xl text-pink-500"></i></div>

<!-- Upload Modal -->
<div id="uploadModal" class="glass-modal">
    <div class="glass-card">
        <div class="flex justify-between items-center mb-4"><h2 class="text-xl">📤 رفع محتوى</h2><i id="closeUpload" class="fas fa-times cursor-pointer text-gray-400 text-xl"></i></div>
        <div id="dropZone" class="drop-area"><i class="fas fa-cloud-upload-alt text-3xl text-cyan-400 mb-2 block"></i><p>اسحب الملفات هنا أو اضغط</p><input type="file" id="fileInput" multiple accept="image/*,video/mp4" style="display:none"></div>
        <textarea id="postCaption" rows="2" placeholder="وصف المنشور..."></textarea>
        <div id="progressList" class="mt-3 max-h-60 overflow-y-auto"></div>
        <button id="startUpload" class="w-full bg-cyan-600 py-2 rounded-full mt-4">بدء الرفع</button>
    </div>
</div>

<!-- Chat Window -->
<div id="chatWindow" class="chat-window">
    <div class="flex justify-between items-center p-4 border-b border-pink-500"><span class="font-bold">💬 الدردشة العامة</span><i id="closeChat" class="fas fa-times cursor-pointer"></i></div>
    <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm"></div>
    <div class="p-4 flex gap-2"><input id="chatInput" placeholder="رسالة..."><button id="sendChat" class="text-pink-500 px-3">إرسال</button><button id="recordAudio" class="bg-red-600 w-10 h-10 rounded-full"><i class="fas fa-microphone"></i></button></div>
    <div id="recordingStatus" class="text-xs text-center text-red-400 hidden pb-2">🎙️ جاري التسجيل...</div>
</div>

<!-- Profile Modal (سيتم تعبئته بالجافاسكريبت) -->
<div id="profileModal" class="glass-modal">
    <div class="glass-card text-white">
        <div class="flex justify-between"><h2 class="text-xl">👤 الملف الشخصي</h2><i id="closeProfile" class="fas fa-times cursor-pointer"></i></div>
        <div class="flex flex-col items-center my-4"><img id="profileAvatar" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full border-2 border-cyan-400"><button id="changeAvatar" class="text-xs bg-gray-700 px-3 py-1 rounded-full mt-2">تغيير الصورة</button></div>
        <input type="text" id="editUsername" placeholder="اسم المستخدم" class="mb-3">
        <textarea id="editBio" rows="2" placeholder="السيرة الذاتية" class="mb-3"></textarea>
        <button id="saveProfile" class="bg-cyan-600 w-full py-2 rounded-full mb-3">حفظ التغييرات</button>
        <hr class="border-white/10 my-3"><div class="flex justify-between"><span>المتابعون: <span id="modalFollowers">0</span></span><span>يتابع: <span id="modalFollowing">0</span></span><span>منشورات: <span id="modalPosts">0</span></span></div>
        <div id="adminBtnContainer" class="hidden mt-3"><button id="openAdminPanel" class="bg-red-600 w-full py-2 rounded-full"><i class="fas fa-crown"></i> لوحة التحكم (أدمن)</button></div>
        <hr class="border-white/10 my-3"><div id="userPostsList" class="max-h-40 overflow-y-auto space-y-2 text-sm"></div>
    </div>
</div>

<!-- Admin Panel -->
<div id="adminModal" class="glass-modal">
    <div class="glass-card">
        <div class="flex justify-between"><h2 class="text-red-500">🛡️ لوحة التحكم</h2><i id="closeAdmin" class="fas fa-times cursor-pointer"></i></div>
        <div><h3 class="font-bold mt-3">المستخدمون</h3><div id="adminUsersList" class="max-h-60 overflow-y-auto space-y-2 my-2"></div><h3 class="font-bold mt-4">المنشورات</h3><div id="adminPostsList" class="max-h-60 overflow-y-auto space-y-2 my-2"></div></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
