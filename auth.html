<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | AYONI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card {
            background: #ffffff;
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.5s ease;
        }
        
        body.dark-mode .card {
            background: #000000;
            border: 1px solid #2f3336;
        }
        
        .card h1 {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 28px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #f0f0f0;
            border-radius: 60px;
            padding: 4px;
        }
        
        body.dark-mode .tabs {
            background: #1a1a1a;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }
        
        body.dark-mode .tab {
            color: #aaa;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            color: white;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }
        
        body.dark-mode input {
            background: #1a1a1a;
            border-color: #2f3336;
            color: white;
        }
        
        input:focus {
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .error-msg {
            color: #ff6b35;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #8e8e8e;
            font-size: 13px;
        }
        
        .footer a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">
    <i class="fas fa-moon"></i>
</button>

<div class="card">
    <h1>AYONI</h1>
    
    <div class="tabs">
        <button class="tab active" id="tabLoginBtn">تسجيل الدخول</button>
        <button class="tab" id="tabRegisterBtn">إنشاء حساب</button>
    </div>
    
    <!-- Login Form -->
    <div id="loginForm" class="form active">
        <div style="text-align: right; margin-bottom: 20px;">
            <h2 style="font-size: 22px; font-weight: 700;">تسجيل الدخول</h2>
            <p style="color: #8e8e8e; margin-top: 4px; font-size: 13px;">مرحباً بعودتك</p>
        </div>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
        <button id="loginBtn">تسجيل الدخول</button>
        <div id="loginError" class="error-msg"></div>
        <div class="footer">
            ليس لديك حساب؟ <a id="switchToRegister">إنشاء حساب</a>
        </div>
    </div>
    
    <!-- Register Form -->
    <div id="registerForm" class="form">
        <div style="text-align: right; margin-bottom: 20px;">
            <h2 style="font-size: 22px; font-weight: 700;">إنشاء حساب</h2>
            <p style="color: #8e8e8e; margin-top: 4px; font-size: 13px;">انضم إلى AYONI اليوم</p>
        </div>
        <input type="text" id="regName" placeholder="اسم المستخدم" autocomplete="name">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="regPassword" placeholder="كلمة المرور" autocomplete="new-password">
        <input type="password" id="regConfirm" placeholder="تأكيد كلمة المرور" autocomplete="off">
        <button id="registerBtn">إنشاء حساب</button>
        <div id="registerError" class="error-msg"></div>
        <div class="footer">
            لديك حساب؟ <a id="switchToLogin">تسجيل الدخول</a>
        </div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    // ==================== AYONI Auth Page ====================
    
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        const btn = document.querySelector('.theme-toggle i');
        if (isDark) {
            btn.classList.remove('fa-moon');
            btn.classList.add('fa-sun');
        } else {
            btn.classList.remove('fa-sun');
            btn.classList.add('fa-moon');
        }
        localStorage.setItem('authTheme', isDark ? 'dark' : 'light');
    }
    
    if (localStorage.getItem('authTheme') === 'dark') {
        document.body.classList.add('dark-mode');
        const btn = document.querySelector('.theme-toggle i');
        btn.classList.remove('fa-moon');
        btn.classList.add('fa-sun');
    }
    
    function showLogin() {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('registerForm').classList.remove('active');
        document.getElementById('tabLoginBtn').classList.add('active');
        document.getElementById('tabRegisterBtn').classList.remove('active');
        clearErrors();
    }
    
    function showRegister() {
        document.getElementById('registerForm').classList.add('active');
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('tabRegisterBtn').classList.add('active');
        document.getElementById('tabLoginBtn').classList.remove('active');
        clearErrors();
    }
    
    function clearErrors() {
        document.getElementById('loginError').innerHTML = '';
        document.getElementById('registerError').innerHTML = '';
    }
    
    function setLoading(btnId, loading, text) {
        const btn = document.getElementById(btnId);
        if (loading) {
            btn.innerHTML = '<span class="loading-spinner"></span> جاري...';
            btn.classList.add('btn-loading');
            btn.disabled = true;
        } else {
            btn.innerHTML = text;
            btn.classList.remove('btn-loading');
            btn.disabled = false;
        }
    }
    
    document.getElementById('tabLoginBtn').onclick = showLogin;
    document.getElementById('tabRegisterBtn').onclick = showRegister;
    document.getElementById('switchToRegister').onclick = showRegister;
    document.getElementById('switchToLogin').onclick = showLogin;
    
    // Login
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            document.getElementById('loginError').innerHTML = '⚠️ الرجاء إدخال البريد الإلكتروني وكلمة المرور';
            return;
        }
        
        setLoading('loginBtn', true, 'تسجيل الدخول');
        
        try {
            const result = await auth.signInWithEmailAndPassword(email, password);
            
            const snapshot = await db.ref(`users/${result.user.uid}`).once('value');
            if (!snapshot.exists()) {
                await db.ref(`users/${result.user.uid}`).set({
                    name: result.user.displayName || email.split('@')[0],
                    email: email,
                    bio: "مرحباً! أنا في AYONI ✨",
                    avatar: "",
                    cover: "",
                    website: "",
                    verified: false,
                    isAdmin: email === ADMIN_EMAIL,
                    blockedUsers: {},
                    mutedUntil: 0,
                    createdAt: Date.now()
                });
            }
            
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                await db.ref(`users/${result.user.uid}`).update({ isAdmin: true, verified: true, name: 'Admin AYONI' });
            }
            
            window.location.href = 'index.html';
        } catch (error) {
            let msg = '';
            if (error.code === 'auth/user-not-found') msg = '❌ لا يوجد حساب بهذا البريد';
            else if (error.code === 'auth/wrong-password') msg = '❌ كلمة المرور غير صحيحة';
            else if (error.code === 'auth/invalid-email') msg = '❌ البريد الإلكتروني غير صالح';
            else if (error.code === 'auth/too-many-requests') msg = '❌ تم تعطيل الحساب مؤقتاً';
            else msg = '❌ ' + error.message;
            document.getElementById('loginError').innerHTML = msg;
            setLoading('loginBtn', false, 'تسجيل الدخول');
        }
    };
    
    // Register
    document.getElementById('registerBtn').onclick = async () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!name || !email || !password) {
            document.getElementById('registerError').innerHTML = '⚠️ الرجاء ملء جميع الحقول';
            return;
        }
        if (password !== confirm) {
            document.getElementById('registerError').innerHTML = '⚠️ كلمة المرور غير متطابقة';
            return;
        }
        if (password.length < 6) {
            document.getElementById('registerError').innerHTML = '⚠️ كلمة المرور 6 أحرف على الأقل';
            return;
        }
        
        setLoading('registerBtn', true, 'إنشاء حساب');
        
        try {
            const result = await auth.createUserWithEmailAndPassword(email, password);
            await result.user.updateProfile({ displayName: name });
            
            await db.ref(`users/${result.user.uid}`).set({
                name: name,
                email: email,
                bio: "مرحباً! أنا في AYONI ✨",
                avatar: "",
                cover: "",
                website: "",
                verified: false,
                isAdmin: email === ADMIN_EMAIL,
                blockedUsers: {},
                mutedUntil: 0,
                createdAt: Date.now()
            });
            
            window.location.href = 'index.html';
        } catch (error) {
            let msg = '';
            if (error.code === 'auth/email-already-in-use') msg = '❌ البريد الإلكتروني مستخدم بالفعل';
            else if (error.code === 'auth/invalid-email') msg = '❌ البريد الإلكتروني غير صالح';
            else if (error.code === 'auth/weak-password') msg = '❌ كلمة المرور ضعيفة جداً';
            else msg = '❌ ' + error.message;
            document.getElementById('registerError').innerHTML = msg;
            setLoading('registerBtn', false, 'إنشاء حساب');
        }
    };
    
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.href = 'index.html';
        }
    });
</script>

</body>
</html>
