<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XSPHERE | دخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #010105);
            font-family: 'Segoe UI', system-ui;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid #0ff3;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .input-glow {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 12px 18px;
            width: 100%;
            color: white;
            transition: 0.2s;
        }
        .input-glow:focus {
            border-color: #0ff;
            box-shadow: 0 0 12px #0ff;
            outline: none;
        }
        .btn-neon {
            background: linear-gradient(95deg, #00c6ff, #0072ff);
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            border: none;
        }
        .btn-neon:active { transform: scale(0.97); }
        .link { color: #0ff; cursor: pointer; font-weight: 500; }
        .error-msg, .success-msg {
            border-radius: 28px;
            padding: 10px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .error-msg { background: #ff003320; border: 1px solid #ff0033; color: #ffb3b3; }
        .success-msg { background: #00ff8020; border: 1px solid #00ff80; color: #b3ffd9; }
    </style>
</head>
<body>
<div class="glass-card">
    <div class="text-center mb-6">
        <i class="fas fa-globe text-5xl text-cyan-400"></i>
        <h1 class="text-3xl font-bold mt-2">XSPHERE</h1>
        <p class="text-gray-300 text-sm">عالم جديد من التواصل</p>
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <!-- Login -->
    <div id="loginView">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="input-glow mb-3">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" class="input-glow mb-5">
        <button id="loginBtn" class="btn-neon">دخول</button>
        <div class="flex justify-between mt-3 text-sm">
            <span id="showRegister" class="link">إنشاء حساب</span>
            <span id="resetPwdBtn" class="link">نسيت كلمة المرور؟</span>
        </div>
        <hr class="my-5 border-white/20">
        <button id="googleLoginBtn" class="w-full bg-white/10 hover:bg-white/20 border border-white/20 rounded-full py-2 flex items-center justify-center gap-2"><i class="fab fa-google"></i> Google</button>
    </div>

    <!-- Register -->
    <div id="registerView" style="display: none;">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="input-glow mb-3">
        <input type="text" id="regUsername" placeholder="اسم المستخدم" class="input-glow mb-3">
        <input type="password" id="regPassword" placeholder="كلمة المرور (6+ حروف)" class="input-glow mb-3">
        <input type="password" id="regConfirm" placeholder="تأكيد كلمة المرور" class="input-glow mb-5">
        <button id="registerBtn" class="btn-neon">إنشاء حساب</button>
        <div class="text-center mt-3"><span id="showLogin" class="link">لديك حساب؟ تسجيل الدخول</span></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    const loginDiv = document.getElementById('loginView');
    const regDiv = document.getElementById('registerView');
    const errDiv = document.getElementById('errorMsg');
    const sucDiv = document.getElementById('successMsg');

    function showError(msg) {
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.style.display = 'none', 6000);
    }
    function showSuccess(msg) {
        sucDiv.innerText = msg;
        sucDiv.style.display = 'block';
        setTimeout(() => sucDiv.style.display = 'none', 6000);
    }

    document.getElementById('showRegister').onclick = () => {
        loginDiv.style.display = 'none';
        regDiv.style.display = 'block';
    };
    document.getElementById('showLogin').onclick = () => {
        regDiv.style.display = 'none';
        loginDiv.style.display = 'block';
    };

    // Login
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value;
        if (!email || !pass) return showError('املأ جميع الحقول');
        try {
            const userCred = await auth.signInWithEmailAndPassword(email, pass);
            if (!userCred.user.emailVerified) {
                await auth.signOut();
                return showError('❌ حسابك غير مؤكد. يرجى التحقق من بريدك الإلكتروني (رابط التأكيد أرسل عند التسجيل).');
            }
            window.location.href = 'index.html';
        } catch (err) {
            showError(err.message);
        }
    };

    // Register
    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value.trim();
        const username = document.getElementById('regUsername').value.trim();
        const pass = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        if (!email || !username || !pass) return showError('املأ جميع الحقول');
        if (pass !== confirm) return showError('كلمتا المرور غير متطابقتين');
        if (pass.length < 6) return showError('كلمة المرور 6 أحرف على الأقل');
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, pass);
            await userCred.user.updateProfile({ displayName: username });
            await userCred.user.sendEmailVerification();
            showSuccess('✅ تم إرسال رابط التأكيد إلى بريدك الإلكتروني. يرجى التحقق ثم تسجيل الدخول.');
            await auth.signOut();
            // العودة إلى واجهة الدخول بعد 3 ثوانٍ
            setTimeout(() => {
                regDiv.style.display = 'none';
                loginDiv.style.display = 'block';
            }, 4000);
        } catch (err) {
            showError(err.message);
        }
    };

    // Google Login
    document.getElementById('googleLoginBtn').onclick = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            if (!result.user.emailVerified) {
                await auth.signOut();
                return showError('يرجى التأكد من بريد Google الخاص بك (يجب أن يكون مفعلاً).');
            }
            window.location.href = 'index.html';
        } catch (err) {
            showError(err.message);
        }
    };

    // Reset Password
    document.getElementById('resetPwdBtn').onclick = async () => {
        const email = prompt('أدخل بريدك الإلكتروني لإعادة تعيين كلمة المرور:');
        if (email && email.includes('@')) {
            try {
                await auth.sendPasswordResetEmail(email);
                alert('✅ تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني.');
            } catch (err) {
                showError(err.message);
            }
        } else {
            showError('بريد إلكتروني غير صالح');
        }
    };

    // If already logged in and verified, go to index
    auth.onAuthStateChanged(user => {
        if (user && user.emailVerified) {
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
