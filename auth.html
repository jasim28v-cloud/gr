<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ECHO | دخول</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: radial-gradient(circle at 20% 30%, #0a0f2a, #03050b);
      font-family: 'Segoe UI', system-ui;
    }
    .glass-card {
      background: rgba(20, 30, 55, 0.5);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }
    .btn-neon { background: linear-gradient(95deg, #00c6ff, #0072ff); }
    input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
    input:focus { border-color: #0ff; box-shadow: 0 0 12px #0ff; outline: none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="glass-card w-full max-w-md p-8 text-white">
    <div class="text-center mb-6">
      <i class="fas fa-waveform text-5xl text-cyan-400"></i>
      <h1 class="text-4xl font-bold mt-2">ECHO</h1>
      <p class="text-gray-300 text-sm">حيث يتردد صدى الإبداع</p>
    </div>
    <div id="errorMsg" class="bg-red-500/20 border border-red-500 rounded-2xl p-3 text-sm hidden mb-4"></div>
    <div id="successMsg" class="bg-green-500/20 border border-green-500 rounded-2xl p-3 text-sm hidden mb-4"></div>

    <div id="loginView">
      <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full rounded-2xl p-3 mb-3">
      <input type="password" id="loginPassword" placeholder="كلمة المرور" class="w-full rounded-2xl p-3 mb-4">
      <button id="loginBtn" class="btn-neon w-full py-3 rounded-2xl font-bold">دخول</button>
      <div class="flex justify-between text-sm mt-3">
        <span id="showRegister" class="text-cyan-400 cursor-pointer">حساب جديد</span>
        <span id="resetPwdBtn" class="text-gray-400 cursor-pointer">نسيت كلمة المرور؟</span>
      </div>
      <hr class="my-5 border-white/20">
      <button id="googleLoginBtn" class="w-full bg-white/10 rounded-2xl py-3 flex items-center justify-center gap-2"><i class="fab fa-google"></i> Google</button>
    </div>

    <div id="registerView" class="hidden">
      <input type="email" id="regEmail" placeholder="البريد" class="w-full rounded-2xl p-3 mb-3">
      <input type="text" id="regUsername" placeholder="اسم المستخدم" class="w-full rounded-2xl p-3 mb-3">
      <input type="password" id="regPassword" placeholder="كلمة المرور (6+)" class="w-full rounded-2xl p-3 mb-3">
      <input type="password" id="regConfirm" placeholder="تأكيد" class="w-full rounded-2xl p-3 mb-4">
      <button id="registerBtn" class="btn-neon w-full py-3 rounded-2xl font-bold">إنشاء حساب</button>
      <div class="text-center mt-3"><span id="showLogin" class="text-cyan-400 cursor-pointer">لدي حساب</span></div>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script>
    const auth = firebase.auth();
    const loginDiv = document.getElementById('loginView'), regDiv = document.getElementById('registerView');
    const errDiv = document.getElementById('errorMsg'), sucDiv = document.getElementById('successMsg');
    const showErr = (msg) => { errDiv.innerText = msg; errDiv.classList.remove('hidden'); setTimeout(()=>errDiv.classList.add('hidden'), 5000); };
    const showSuc = (msg) => { sucDiv.innerText = msg; sucDiv.classList.remove('hidden'); setTimeout(()=>sucDiv.classList.add('hidden'), 5000); };

    document.getElementById('showRegister').onclick = () => { loginDiv.classList.add('hidden'); regDiv.classList.remove('hidden'); };
    document.getElementById('showLogin').onclick = () => { regDiv.classList.add('hidden'); loginDiv.classList.remove('hidden'); };
    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pwd = document.getElementById('loginPassword').value;
      if (!email || !pwd) return showErr('املأ الحقول');
      try {
        const userCred = await auth.signInWithEmailAndPassword(email, pwd);
        if (!userCred.user.emailVerified) {
          await auth.signOut();
          showErr('يرجى تأكيد بريدك الإلكتروني أولاً. تحقق من صندوق الوارد.');
          return;
        }
        window.location.href = 'index.html';
      } catch(e) { showErr(e.message); }
    };
    document.getElementById('registerBtn').onclick = async () => {
      const email = document.getElementById('regEmail').value.trim();
      const username = document.getElementById('regUsername').value.trim();
      const pwd = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      if (!email || !username || !pwd) return showErr('املأ كل الحقول');
      if (pwd !== confirm) return showErr('كلمتا المرور غير متطابقتين');
      if (pwd.length < 6) return showErr('كلمة المرور 6 أحرف على الأقل');
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pwd);
        await cred.user.updateProfile({ displayName: username });
        await cred.user.sendEmailVerification();
        showSuc('تم إرسال رابط التأكيد إلى بريدك. يرجى التحقق ثم تسجيل الدخول.');
        await auth.signOut();
        setTimeout(() => { window.location.reload(); }, 3000);
      } catch(e) { showErr(e.message); }
    };
    document.getElementById('googleLoginBtn').onclick = async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const result = await auth.signInWithPopup(provider);
        if (result.user.emailVerified === false) {
          await auth.signOut();
          showErr('يرجى تأكيد بريد Google الخاص بك أولاً.');
          return;
        }
        window.location.href = 'index.html';
      } catch(e) { showErr(e.message); }
    };
    document.getElementById('resetPwdBtn').onclick = async () => {
      const email = prompt('أدخل بريدك الإلكتروني:');
      if (email) {
        await auth.sendPasswordResetEmail(email);
        alert('تم إرسال رابط إعادة التعيين إلى بريدك.');
      }
    };
    auth.onAuthStateChanged(user => { if (user && user.emailVerified) window.location.href = 'index.html'; });
  </script>
</body>
</html>
