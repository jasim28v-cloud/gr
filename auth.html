<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VØID_X | دخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        body {
            background: radial-gradient(circle at 50% 50%, #1a000d 0%, #000 100%);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-auth {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .neon-input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 14px 20px;
            width: 100%;
            color: white;
            transition: 0.2s;
        }
        .neon-input:focus { border-color: #ff007f; box-shadow: 0 0 20px #ff007f; outline: none; }
        .btn-neon {
            background: linear-gradient(95deg, #ff007f, #b0005a);
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            border: none;
        }
        .btn-neon:active { transform: scale(0.96); }
        .link { color: #ff007f; cursor: pointer; }
    </style>
</head>
<body>
<div class="glass-auth">
    <div class="text-center mb-6">
        <i class="fas fa-skull text-5xl text-pink-500"></i>
        <h1 class="text-4xl font-[Orbitron] mt-2 text-white">VØID_X</h1>
        <p class="text-gray-400 text-sm">تسجيل الدخول إلى الشبكة</p>
    </div>
    <div id="errorMsg" class="bg-red-500/20 border border-red-500 rounded-2xl p-3 text-sm hidden mb-4"></div>
    <div id="successMsg" class="bg-green-500/20 border border-green-500 rounded-2xl p-3 text-sm hidden mb-4"></div>

    <div id="loginView">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="neon-input mb-4">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" class="neon-input mb-6">
        <button id="loginBtn" class="btn-neon">🚀 دخول</button>
        <div class="flex justify-between mt-4 text-sm"><span class="link" id="showRegister">إنشاء حساب</span><span class="link" id="resetPwdBtn">نسيت كلمة المرور؟</span></div>
        <hr class="my-6 border-white/10">
        <button id="googleLoginBtn" class="w-full bg-white/10 hover:bg-white/20 border border-white/20 rounded-full py-3 flex items-center justify-center gap-3"><i class="fab fa-google"></i> Google</button>
    </div>

    <div id="registerView" style="display: none;">
        <input type="email" id="regEmail" placeholder="البريد" class="neon-input mb-3">
        <input type="text" id="regUsername" placeholder="اسم المستخدم" class="neon-input mb-3">
        <input type="password" id="regPassword" placeholder="كلمة المرور (6+)" class="neon-input mb-3">
        <input type="password" id="regConfirm" placeholder="تأكيد" class="neon-input mb-5">
        <button id="registerBtn" class="btn-neon">✨ إنشاء حساب</button>
        <div class="text-center mt-4"><span class="link" id="showLogin">لديك حساب؟ تسجيل الدخول</span></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    const loginDiv = document.getElementById('loginView'), regDiv = document.getElementById('registerView');
    const errDiv = document.getElementById('errorMsg'), sucDiv = document.getElementById('successMsg');
    function showError(msg) { errDiv.innerText = msg; errDiv.style.display = 'block'; setTimeout(()=>errDiv.style.display='none',5000); }
    function showSuccess(msg) { sucDiv.innerText = msg; sucDiv.style.display = 'block'; setTimeout(()=>sucDiv.style.display='none',5000); }
    document.getElementById('showRegister').onclick = () => { loginDiv.style.display='none'; regDiv.style.display='block'; };
    document.getElementById('showLogin').onclick = () => { regDiv.style.display='none'; loginDiv.style.display='block'; };
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        if(!email||!pwd) return showError('املأ الحقول');
        try{
            const cred = await auth.signInWithEmailAndPassword(email,pwd);
            if(!cred.user.emailVerified){ await auth.signOut(); showError('يرجى تأكيد بريدك أولاً'); return; }
            window.location.href = 'index.html';
        }catch(e){ showError(e.message); }
    };
    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value.trim();
        const username = document.getElementById('regUsername').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const cnf = document.getElementById('regConfirm').value;
        if(!email||!username||!pwd) return showError('املأ جميع الحقول');
        if(pwd!==cnf) return showError('كلمتا المرور غير متطابقتين');
        if(pwd.length<6) return showError('كلمة المرور 6 أحرف على الأقل');
        try{
            const cred = await auth.createUserWithEmailAndPassword(email,pwd);
            await cred.user.updateProfile({displayName: username});
            await cred.user.sendEmailVerification();
            showSuccess('تم إرسال رابط التأكيد إلى بريدك. يرجى التحقق ثم تسجيل الدخول.');
            await auth.signOut();
            setTimeout(()=>window.location.reload(),4000);
        }catch(e){ showError(e.message); }
    };
    document.getElementById('googleLoginBtn').onclick = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try{ await auth.signInWithPopup(provider); window.location.href='index.html'; }catch(e){ showError(e.message); }
    };
    document.getElementById('resetPwdBtn').onclick = async () => {
        const email = prompt('أدخل بريدك الإلكتروني:');
        if(email) { await auth.sendPasswordResetEmail(email); alert('تم إرسال رابط إعادة التعيين إلى بريدك.'); }
    };
    auth.onAuthStateChanged(user => { if(user && user.emailVerified) window.location.href='index.html'; });
</script>
</body>
</html>
